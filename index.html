<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добратимия</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            color: white;
            padding: 2rem;
        }
        .card {
            background: white;
            color: #1e293b;
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { color: #64748b; margin-bottom: 2rem; line-height: 1.5; }
        .links { display: flex; flex-direction: column; gap: 0.75rem; }
        a {
            display: block;
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        a:hover { transform: translateY(-2px); }
        .desktop { background: #10b981; color: white; }
        .mobile { background: #3b82f6; color: white; }
        small { display: block; margin-top: 1.5rem; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Добратимия</h1>
        <p>Территория гармонии и спокойствия. Выберите версию интерфейса.</p>
        <div class="links">
            <a class="desktop" href="NUMDOBRA.html">💻 Десктоп</a>
            <a class="mobile" href="dobratimia-mobile.html">📱 Мобильная</a>
        </div>
        <small>Для голосового ввода используйте Chrome или Edge.</small>
    </div>
</body>
</html>
